name: Build iOS dylib

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download Lua source
        run: |
          curl -sL https://www.lua.org/ftp/lua-5.4.6.tar.gz -o lua.tar.gz
          tar xzf lua.tar.gz

      - name: Build Lua for host
        run: |
          cd lua-5.4.6
          make macosx CC=clang
          cd ..

      - name: Extract CoreFoundation headers from macOS SDK
        run: |
          MACOS_SDK=$(xcrun --sdk macosx --show-sdk-path)
          mkdir -p cf_include/CoreFoundation
          # Copy all CF headers
          cp "$MACOS_SDK/System/Library/Frameworks/CoreFoundation.framework/Headers/"*.h cf_include/CoreFoundation/
          # The module map is needed for umbrella headers
          cp -r "$MACOS_SDK/System/Library/Frameworks/CoreFoundation.framework/Modules" cf_include/CoreFoundation/ 2>/dev/null || true

      - name: Build device dylibs (arm64 + arm64e)
        run: |
          IPHONE_SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          LUA_SRC=lua-5.4.6/src

          for arch in arm64 arm64e; do
            xcrun --sdk iphoneos clang \
              -arch $arch \
              -shared \
              -o sz-$arch.dylib \
              sz.c \
              -isysroot "$IPHONE_SDK" \
              -I./cf_include \
              -I"$LUA_SRC" \
              "$LUA_SRC/liblua.a" \
              -lm
          done

      - name: Build simulator dylib (x86_64)
        run: |
          SIM_SDK=$(xcrun --sdk iphonesimulator --show-sdk-path)
          LUA_SRC=lua-5.4.6/src

          xcrun --sdk iphonesimulator clang \
            -arch x86_64 \
            -shared \
            -o sz-x86_64.dylib \
            sz.c \
            -isysroot "$SIM_SDK" \
            -I./cf_include \
            -I"$LUA_SRC" \
            "$LUA_SRC/liblua.a" \
            -lm

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sz-dylibs
          path: |
            sz-arm64.dylib
            sz-arm64e.dylib
            sz-x86_64.dylib
