name: Build iOS dylib

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get SDK paths
        id: sdk
        run: |
          IPHONE_SDK=$(xcrun --show-sdk-path --sdk iphoneos)
          SIM_SDK=$(xcrun --show-sdk-path --sdk iphonesimulator)
          echo "iphoneos=$IPHONE_SDK"
          echo "iphonesimulator=$SIM_SDK"
          echo "iphonesim=$SIM_SDK" >> $GITHUB_OUTPUT

      - name: Download Lua source
        run: |
          curl -sL https://www.lua.org/ftp/lua-5.4.6.tar.gz -o lua.tar.gz
          tar xzf lua.tar.gz

      - name: Build Lua for macOS (x86_64)
        run: |
          cd lua-5.4.6
          make macosx CC=clang
          cp src/liblua.a ../lua-x86_64.a
          cd ..

      - name: Build Lua for iOS arm64
        run: |
          cd lua-5.4.6
          make clean
          make \
            CC="clang -DLUA_USE_IOS -DLUA_USE_POSIX -DLUA_COMPAT_5_3 -target arm64-apple-ios12.0-simulator -isysroot ${{ steps.sdk.outputs.iphonesim }}" \
            AR="clang -DLUA_USE_IOS -target arm64-apple-ios12.0-simulator -isysroot ${{ steps.sdk.outputs.iphonesim }} -r" \
            SYSLIBS="-lm" \
            CORE_O="lapi.o lauxlib.o lbaselib.o lcode.o lcorolib.o lctype.o ldebug.o ldo.o ldump.o lfunc.o lgc.o llex.o lmem.o lobject.o lopcodes.o lparser.o lstate.o lstring.o ltable.o ltm.o lundump.o lvm.o lzio.o" \
            LIB_O="liolib.o lmathlib.o lstrlib.o ltablib.o lutf8lib.o ldblib.o loadlib.o linit.o" \
            MYCFLAGS="-DLUA_USE_IOS -DLUA_COMPAT_5_3" \
            generic
          cp src/liblua.a lua-arm64.a
          cd ..

      - name: Build Lua for iOS arm64e
        run: |
          cd lua-5.4.6
          make clean
          make \
            CC="clang -DLUA_USE_IOS -DLUA_USE_POSIX -DLUA_COMPAT_5_3 -target arm64e-apple-ios14.0-simulator -isysroot ${{ steps.sdk.outputs.iphonesim }}" \
            AR="clang -DLUA_USE_IOS -target arm64e-apple-ios14.0-simulator -isysroot ${{ steps.sdk.outputs.iphonesim }} -r" \
            SYSLIBS="-lm" \
            CORE_O="lapi.o lauxlib.o lbaselib.o lcode.o lcorolib.o lctype.o ldebug.o ldo.o ldump.o lfunc.o lgc.o llex.o lmem.o lobject.o lopcodes.o lparser.o lstate.o lstring.o ltable.o ltm.o lundump.o lvm.o lzio.o" \
            LIB_O="liolib.o lmathlib.o lstrlib.o ltablib.o lutf8lib.o ldblib.o loadlib.o linit.o" \
            MYCFLAGS="-DLUA_USE_IOS -DLUA_COMPAT_5_3" \
            generic
          cp src/liblua.a lua-arm64e.a
          cd ..

      - name: Build x86_64 simulator dylib
        run: |
          clang \
            -target x86_64-apple-ios-simulator \
            -arch x86_64 \
            -isysroot "${{ steps.sdk.outputs.iphonesim }}" \
            -shared \
            -o sz-x86_64.dylib \
            sz.c \
            -I"lua-5.4.6/src" \
            lua-x86_64.a \
            -lm \
            -framework CoreFoundation

      - name: Build arm64 simulator dylib
        run: |
          clang \
            -target arm64-apple-ios12.0-simulator \
            -arch arm64 \
            -isysroot "${{ steps.sdk.outputs.iphonesim }}" \
            -shared \
            -o sz-arm64.dylib \
            sz.c \
            -I"lua-5.4.6/src" \
            lua-arm64.a \
            -lm \
            -framework CoreFoundation

      - name: Build arm64e simulator dylib
        run: |
          clang \
            -target arm64e-apple-ios14.0-simulator \
            -arch arm64e \
            -isysroot "${{ steps.sdk.outputs.iphonesim }}" \
            -shared \
            -o sz-arm64e.dylib \
            sz.c \
            -I"lua-5.4.6/src" \
            lua-arm64e.a \
            -lm \
            -framework CoreFoundation

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sz-dylibs
          path: |
            sz-arm64.dylib
            sz-arm64e.dylib
            sz-x86_64.dylib