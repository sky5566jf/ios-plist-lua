name: Build iOS dylib

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download Lua source
        run: |
          curl -sL https://www.lua.org/ftp/lua-5.4.6.tar.gz -o lua.tar.gz
          tar xzf lua.tar.gz

      - name: Build Lua for host
        run: |
          cd lua-5.4.6
          make macosx CC=clang
          cd ..

      - name: Build device dylibs (arm64 + arm64e)
        run: |
          LUA_SRC=lua-5.4.6/src

          # Use macOS clang, -target for iOS arch, no -isysroot
          for arch in arm64 arm64e; do
            clang \
              -target arm64-apple-ios$([ "$arch" = "arm64e" ] && echo "14.0" || echo "12.0")-simulator \
              -arch $arch \
              -shared \
              -o sz-$arch.dylib \
              sz.c \
              -I"$LUA_SRC" \
              "$LUA_SRC/liblua.a" \
              -lm \
              -framework CoreFoundation
          done

      - name: Build simulator dylib (x86_64)
        run: |
          LUA_SRC=lua-5.4.6/src

          clang \
            -target x86_64-apple-ios-simulator \
            -arch x86_64 \
            -shared \
            -o sz-x86_64.dylib \
            sz.c \
            -I"$LUA_SRC" \
            "$LUA_SRC/liblua.a" \
            -lm \
            -framework CoreFoundation

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sz-dylibs
          path: |
            sz-arm64.dylib
            sz-arm64e.dylib
            sz-x86_64.dylib
