name: Build iOS dylib

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get SDK paths
        id: sdk
        run: |
          IPHONE_SDK=$(xcrun --show-sdk-path --sdk iphoneos)
          SIM_SDK=$(xcrun --show-sdk-path --sdk iphonesimulator)
          echo "iphoneos=$IPHONE_SDK"
          echo "iphonesimulator=$SIM_SDK"
          echo "iphonesim=$SIM_SDK" >> $GITHUB_OUTPUT

      - name: Download Lua source
        run: |
          curl -sL https://www.lua.org/ftp/lua-5.4.6.tar.gz -o lua.tar.gz
          tar xzf lua.tar.gz

      - name: Build Lua for host
        run: |
          cd lua-5.4.6
          make macosx CC=clang
          cd ..

      - name: Build arm64 device dylib
        run: |
          LUA_SRC=lua-5.4.6/src
          clang \
            -target arm64-apple-ios12.0-simulator \
            -arch arm64 \
            -isysroot "${{ steps.sdk.outputs.iphonesim }}" \
            -shared \
            -o sz-arm64.dylib \
            sz.c \
            -I"$LUA_SRC" \
            "$LUA_SRC/liblua.a" \
            -lm \
            -framework CoreFoundation

      - name: Build arm64e device dylib
        run: |
          LUA_SRC=lua-5.4.6/src
          clang \
            -target arm64e-apple-ios14.0-simulator \
            -arch arm64e \
            -isysroot "${{ steps.sdk.outputs.iphonesim }}" \
            -shared \
            -o sz-arm64e.dylib \
            sz.c \
            -I"$LUA_SRC" \
            "$LUA_SRC/liblua.a" \
            -lm \
            -framework CoreFoundation

      - name: Build x86_64 simulator dylib
        run: |
          LUA_SRC=lua-5.4.6/src
          clang \
            -target x86_64-apple-ios-simulator \
            -arch x86_64 \
            -isysroot "${{ steps.sdk.outputs.iphonesim }}" \
            -shared \
            -o sz-x86_64.dylib \
            sz.c \
            -I"$LUA_SRC" \
            "$LUA_SRC/liblua.a" \
            -lm \
            -framework CoreFoundation

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sz-dylibs
          path: |
            sz-arm64.dylib
            sz-arm64e.dylib
            sz-x86_64.dylib