name: Build iOS dylib

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            sdk: iphoneos
          - arch: arm64e
            sdk: iphoneos
          - arch: x86_64
            sdk: iphonesimulator

    steps:
      - uses: actions/checkout@v4

      - name: Download Lua source
        run: |
          curl -sL https://www.lua.org/ftp/lua-5.4.6.tar.gz -o lua.tar.gz
          tar xzf lua.tar.gz

      - name: Build Lua for host
        run: |
          cd lua-5.4.6
          make macosx CC=clang
          cd ..

      - name: Build sz.dylib
        env:
          SDK_PATH: ${{ matrix.sdk == 'iphonesimulator' && 'iphonesimulator' || 'iphoneos' }}
        run: |
          IPHONE_SDK=$(xcrun --sdk ${{ matrix.sdk }} --show-sdk-path)
          MACOS_SDK=$(xcrun --sdk macosx --show-sdk-path)
          LUA_SRC=lua-5.4.6/src

          # Use iOS SDK for target arch, macOS SDK for system frameworks (CoreFoundation)
          xcrun --sdk ${{ matrix.sdk }} clang \
            -arch ${{ matrix.arch }} \
            -shared \
            -o sz-${{ matrix.arch }}.dylib \
            sz.c \
            -isysroot "$IPHONE_SDK" \
            -I"$LUA_SRC" \
            "$LUA_SRC/liblua.a" \
            -lm \
            -F"$MACOS_SDK/System/Library/Frameworks" \
            -framework CoreFoundation \
            -Wl,-U,_CFBooleanCreate

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sz-${{ matrix.arch }}.dylib
          path: sz-${{ matrix.arch }}.dylib
