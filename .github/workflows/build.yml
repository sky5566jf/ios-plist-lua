name: Build iOS dylib

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            sdk: iphoneos
            extra_archs: arm64e
          - arch: x86_64
            sdk: iphonesimulator
            extra_archs: ""

    steps:
      - uses: actions/checkout@v4

      - name: Download Lua source
        run: |
          curl -sL https://www.lua.org/ftp/lua-5.4.6.tar.gz -o lua.tar.gz
          tar xzf lua.tar.gz

      - name: Build Lua for host (to get headers reference)
        run: |
          cd lua-5.4.6
          make macosx CC=clang
          cd ..

      - name: Build sz.dylib (arm64 + arm64e for device, x86_64 for simulator)
        run: |
          SDK_PATH=$(xcrun --sdk ${{ matrix.sdk }} --show-sdk-path)
          LUA_SRC=lua-5.4.6/src

          if [ "${{ matrix.sdk }}" = "iphoneos" ]; then
            # Multi-arch: arm64 + arm64e
            clang -arch arm64 -shared -o sz-arm64.dylib sz.c \
              -isysroot "$SDK_PATH" -I"$LUA_SRC" "$LUA_SRC/liblua.a" -lm
            clang -arch arm64e -shared -o sz-arm64e.dylib sz.c \
              -isysroot "$SDK_PATH" -I"$LUA_SRC" "$LUA_SRC/liblua.a" -lm
          else
            # Simulator: x86_64
            clang -arch x86_64 -shared -o sz-x86_64.dylib sz.c \
              -isysroot "$SDK_PATH" -I"$LUA_SRC" "$LUA_SRC/liblua.a" -lm
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sz-${{ matrix.sdk }}
          path: |
            sz-*.dylib
