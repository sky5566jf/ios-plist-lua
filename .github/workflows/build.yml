name: Build iOS dylib

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            sdk: iphoneos
          - arch: arm64e
            sdk: iphoneos
          - arch: x86_64
            sdk: iphonesimulator

    steps:
      - uses: actions/checkout@v4

      - name: Install Lua
        run: brew install lua

      - name: Build sz.dylib
        run: |
          LUA_PREFIX=$(brew --prefix lua)
          LUA_INC="$LUA_PREFIX/include"
          LUA_LIB="$LUA_PREFIX/lib"
          SDK_PATH=$(xcrun --sdk ${{ matrix.sdk }} --show-sdk-path)

          xcrun --sdk ${{ matrix.sdk }} clang \
            -arch ${{ matrix.arch }} \
            -shared \
            -o sz-${{ matrix.arch }}.dylib \
            sz.c \
            -isysroot "$SDK_PATH" \
            -I"$LUA_INC" \
            -L"$LUA_LIB" \
            -llua

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sz-${{ matrix.arch }}.dylib
          path: sz-${{ matrix.arch }}.dylib